<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home-work-21</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pogoda">
        <div class="icon">іконка</div>
        <div class="line">
            <div class="first">Температура повітря</div>
            <div class="temp"></div>
            <div class="second"><sup>0</sup>C</div>
        </div>
        <div class="line">
            <div class="first">Тиск</div>
            <div class="pressure">тиск</div>
            <div class="second">Па</div>
        </div> 
        <div class="line">
            <div class="first">Опис погоди</div>
            <div class="description">опис</div>
        </div> 
        <div class="line">
            <div class="first">Вологість повітря</div>
            <div class="humidity">вологість</div>
            <div class="second">%</div>
        </div> 
        <div class="line">
            <div class="first">Швидкість вітру</div>
            <div class="speed"></div>
            <div class="second">m/s</div>
        </div> 
        <div class="line">
            <div class="first">Напрямок вітру</div>
            <div class="deg"></div>
            <div class="second">градусів</div> 
        </div>  
    </div>
    <script src="app.js"></script>
</body>
</html>
